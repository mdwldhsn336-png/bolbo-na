<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>FIFA WORLD CUP 2026™ | LIVE TV</title>     
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>  
    :root {
      var(--primary-neon): #00ffcc;
      var(--secondary-neon): #cc00ff;
      var(--glass-bg): rgba(255, 255, 255, 0.05);
      var(--glass-border): rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }  
    
    body { 
      background: linear-gradient(135deg, #0b0914 0%, #1a1025 50%, #0d1b2a 100%);
      color: #fff; 
      min-height: 100vh;
      overflow-x: hidden; 
      background-attachment: fixed;
    }  

    header {
      text-align: center;
      padding: 20px 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
    }
    
    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #00ffcc, #cc00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      overflow: hidden;
    }

    .tv-section { max-width: 1100px; margin: 0 auto 40px auto; padding: 10px; }
    .shaka-video-container { width: 100%; aspect-ratio: 16 / 9; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }  
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }  

    .content-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1200px; margin: 0 auto 50px auto; padding: 0 20px; }
    @media (max-width: 850px) { .content-container { grid-template-columns: 1fr; } }

    h2 { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    h2::before { content: ''; display: inline-block; width: 8px; height: 25px; background: linear-gradient(to bottom, #00ffcc, #cc00ff); border-radius: 4px; }

    .card { padding: 20px; margin-bottom: 20px; }
    .teams { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .teams img { width: 30px; height: 30px; }
    .card-meta { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 15px; }

    .countdown-box { display: flex; gap: 12px; }
    .time-block { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: #00ffcc; padding: 10px; border-radius: 10px; text-align: center; font-weight: 800; font-size: 1.2rem; flex: 1; }
    .time-label { font-size: 0.7rem; display: block; font-weight: 400; color: #94a3b8; text-transform: uppercase; margin-top: 3px; }

    .score { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #00ffcc, #00bfff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
    
    .loading { text-align: center; color: #00ffcc; padding: 20px; font-weight: bold; }
  </style>  
</head>  
<body>  
  
  <header><h1>FIFA WORLD CUP 2026™</h1></header>

  <div class="tv-section glass-panel">
    <div class="shaka-video-container" data-shaka-player>  
      <video autoplay playsinline preload="metadata" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>  
    </div>  
  </div>

  <div class="content-container">
    <div>
      <h2>Upcoming Matches</h2>
      <div id="upcoming-container"><div class="loading">Loading Live Data...</div></div>
    </div>
    <div>
      <h2>Latest Results</h2>
      <div id="results-container"><div class="loading">Loading Live Data...</div></div>
    </div>
  </div>
  
  <script>  
    // ১. Shaka Player Setup (আপনার আগের কোড)
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  
      if (!shaka.Player.isBrowserSupported()) return;  
  
      const video = document.querySelector('video');  
      const player = new shaka.Player();  
      await player.attach(video);  
      const container = document.querySelector('.shaka-video-container');  
      const ui = new shaka.ui.Overlay(player, container, video);  
  
      ui.configure({  
        controlPanelElements: ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'fullscreen'],  
        volumeBarColors: { base: 'rgba(0, 255, 204, 0.3)', level: '#00ffcc' },  
        seekBarColors: { base: 'rgba(204, 0, 255, 0.3)', buffered: 'rgba(204, 0, 255, 0.6)', played: '#cc00ff' }
      });  
  
      let drmConfig = { clearKeys: { "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" } };  
      let streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";  
  
      player.configure({ drm: drmConfig });  
      try { await player.load(streamUrl); } catch (error) { console.error('Load error:', error); }  
    });  

    // ২. API Football Integration
    const API_KEY = "4c5725dd2bd62f01783ee0bebc32a8aa";
    const API_URL = "https://v3.football.api-sports.io/fixtures?league=1&season=2026"; // League 1 = World Cup

    let countdownInterval;

    async function fetchFootballData() {
      try {
        const response = await fetch(API_URL, {
          method: "GET",
          headers: { "x-apisports-key": API_KEY }
        });
        const data = await response.json();
        
        if(data.errors && Object.keys(data.errors).length > 0) {
            document.getElementById('upcoming-container').innerHTML = `<div class="loading" style="color:red;">API Error: Limit Reached or Invalid Key</div>`;
            return;
        }

        const fixtures = data.response;

        // Upcoming Matches (Status: NS = Not Started, TBD)
        const upcomingMatches = fixtures.filter(f => ['NS', 'TBD'].includes(f.fixture.status.short)).slice(0, 4);
        
        // Past Matches (Status: FT = Full Time, PEN = Penalties, AET = After Extra Time)
        const pastMatches = fixtures.filter(f => ['FT', 'PEN', 'AET'].includes(f.fixture.status.short)).reverse().slice(0, 4);

        renderUpcoming(upcomingMatches);
        renderPast(pastMatches);
      } catch (error) {
        console.error("Error fetching API data", error);
      }
    }

    function renderUpcoming(matches) {
      const container = document.getElementById('upcoming-container');
      container.innerHTML = ''; // Clear loading text
      
      if(matches.length === 0) {
          container.innerHTML = '<div class="card glass-panel">No upcoming matches scheduled right now.</div>';
          return;
      }

      matches.forEach((match, index) => {
        const matchId = `countdown-${match.fixture.id}`;
        const matchDate = new Date(match.fixture.date);
        
        const html = `
          <div class="card glass-panel">
            <div class="teams">
              <img src="${match.teams.home.logo}" alt="${match.teams.home.name}"> ${match.teams.home.name} 
              <span style="color:#00ffcc; margin:0 10px;">VS</span> 
              ${match.teams.away.name} <img src="${match.teams.away.logo}" alt="${match.teams.away.name}">
            </div>
            <div class="card-meta">📍 ${match.fixture.venue.name || 'TBD'} | ⏱ ${matchDate.toLocaleString()}</div>
            <div class="countdown-box" id="${matchId}" data-time="${match.fixture.date}">
              <div class="time-block"><span class="days">00</span><span class="time-label">Days</span></div>
              <div class="time-block"><span class="hours">00</span><span class="time-label">Hours</span></div>
              <div class="time-block"><span class="mins">00</span><span class="time-label">Mins</span></div>
              <div class="time-block"><span class="secs">00</span><span class="time-label">Secs</span></div>
            </div>
          </div>
        `;
        container.innerHTML += html;
      });

      startCountdown();
    }

    function renderPast(matches) {
      const container = document.getElementById('results-container');
      container.innerHTML = '';
      
      if(matches.length === 0) {
          container.innerHTML = '<div class="card glass-panel">No match results available yet.</div>';
          return;
      }

      matches.forEach(match => {
        const matchDate = new Date(match.fixture.date).toLocaleDateString();
        const html = `
          <div class="card glass-panel">
            <div class="teams">
              <img src="${match.teams.home.logo}" alt="Home"> ${match.teams.home.name} 
              <span style="color:#00ffcc; margin:0 10px;">vs</span> 
              ${match.teams.away.name} <img src="${match.teams.away.logo}" alt="Away">
            </div>
            <div class="card-meta">📅 ${matchDate} | Status: ${match.fixture.status.short}</div>
            <div class="score">${match.goals.home} - ${match.goals.away}</div>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    function startCountdown() {
      if(countdownInterval) clearInterval(countdownInterval);
      
      countdownInterval = setInterval(() => {
        const countdownElements = document.querySelectorAll('.countdown-box');
        const now = new Date().getTime();

        countdownElements.forEach(el => {
          const matchTime = new Date(el.getAttribute('data-time')).getTime();
          const distance = matchTime - now;

          if (distance > 0) {
            el.querySelector('.days').innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            el.querySelector('.hours').innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            el.querySelector('.mins').innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            el.querySelector('.secs').innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
          } else {
            el.innerHTML = `<div class="time-block" style="color: #fff; background: rgba(0, 255, 204, 0.2);">🔴 MATCH STARTED / LIVE</div>`;
          }
        });
      }, 1000);
    }

    // পেজ লোড হলে API থেকে ডেটা কল করবে
    fetchFootballData();

  </script>  
</body>  
</html>
