<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>FIFA WORLD CUP 2026вДҐ | LIVE</title>     
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  

  <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }  
    
    /* Google Dark Theme Colors */
    body { 
      background-color: #202124;
      color: #e8eaed; 
      min-height: 100vh;
      overflow-x: hidden; 
    }  

    /* TV Section (Top) */
    .tv-section { width: 100%; max-width: 1000px; margin: 0 auto; background: #000; border-bottom: 1px solid #3c4043; }
    .shaka-video-container { width: 100%; aspect-ratio: 16 / 9; position: relative; }  
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }  

    /* Content Section (Google Style) */
    .content-container { max-width: 650px; margin: 20px auto; padding: 0 15px; }

    .section-title { font-size: 1.2rem; margin: 25px 0 15px 0; color: #e8eaed; border-bottom: 1px solid #3c4043; padding-bottom: 10px; }

    /* Google Match Card Style */
    .match-card {
      background-color: #303134;
      border: 1px solid #3c4043;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
    }

    .match-header { font-size: 0.85rem; color: #9aa0a6; margin-bottom: 12px; }

    .match-body { display: flex; justify-content: space-between; align-items: center; }

    .teams-container { flex: 1; border-right: 1px solid #3c4043; padding-right: 15px; }
    
    .team-row { display: flex; align-items: center; margin-bottom: 8px; }
    .team-row:last-child { margin-bottom: 0; }
    
    .flag { font-size: 1.2rem; margin-right: 12px; width: 24px; text-align: center; }
    .team-name { font-size: 1rem; color: #e8eaed; flex: 1; }
    .score { font-size: 1.1rem; color: #e8eaed; font-weight: 500; margin-left: 15px; }

    .status-container { width: 100px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    
    .status-text { font-size: 0.85rem; color: #9aa0a6; margin-bottom: 4px; }
    .status-live { color: #81c995; font-weight: 500; } /* Google Green for Live */
    
    .time-badge { font-size: 0.8rem; color: #9aa0a6; }

    /* Countdown Style */
    .countdown { font-size: 0.9rem; color: #fbbc04; font-weight: 500; margin-top: 5px; }

  </style>  
</head>  
<body>  

  <div class="tv-section">
    <div class="shaka-video-container" data-shaka-player>  
      <video autoplay playsinline preload="metadata" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>  
    </div>  
  </div>

  <div class="content-container">
    
    <div id="live-matches-container">
      </div>

    <div class="section-title">Group Stage вАҐ Tomorrow / Upcoming</div>
    <div id="upcoming-matches-container">
      </div>

  </div>
  
  <script>  
    // ==========================================
    // аІІ. Shaka Player Setup
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  
      if (!shaka.Player.isBrowserSupported()) return;  
  
      const video = document.querySelector('video');  
      const player = new shaka.Player();  
      await player.attach(video);  
      const container = document.querySelector('.shaka-video-container');  
      const ui = new shaka.ui.Overlay(player, container, video);  
  
      ui.configure({  
        controlPanelElements: ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'fullscreen'],  
        volumeBarColors: { base: 'rgba(255, 255, 255, 0.3)', level: '#fff' }
      });  
  
      let drmConfig = { clearKeys: { "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" } };  
      let streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";  
  
      player.configure({ drm: drmConfig });  
      try { await player.load(streamUrl); } catch (error) { console.error('Load error:', error); }  
    });  

    // ==========================================
    // аІ®. Match Data (Google Style Structure)
    // ==========================================
    // а¶Жа¶™а¶®а¶њ а¶Ъа¶Ња¶За¶≤аІЗ а¶Па¶З а¶°аІЗа¶Яа¶Ња¶ЧаІБа¶≤аІЛ а¶Жа¶™а¶®а¶Ња¶∞ а¶Ѓа¶§аІЛ а¶Ха¶∞аІЗ а¶™а¶∞а¶ња¶ђа¶∞аІНа¶§а¶® а¶Ха¶∞аІЗ а¶®а¶ња¶§аІЗ а¶™а¶Ња¶∞а¶ђаІЗа¶®а•§
    const matchesData = [
      // Finished Match
      {
        group: "World Cup вАҐ Group J",
        home: { name: "Argentina", flag: "рЯЗ¶рЯЗЈ", score: "3" },
        away: { name: "Algeria", flag: "рЯЗ©рЯЗњ", score: "0" },
        status: "FT", timeLabel: "Today", isLive: false
      },
      // Live Match (Half-time)
      {
        group: "World Cup вАҐ Group K",
        home: { name: "Portugal", flag: "рЯЗµрЯЗє", score: "1" },
        away: { name: "DR Congo", flag: "рЯЗ®рЯЗ©", score: "1" },
        status: "Half-time", timeLabel: "", isLive: true
      }
    ];

    const upcomingMatchesData = [
      // Upcoming Match with Countdown
      {
        group: "World Cup вАҐ Group L",
        home: { name: "England", flag: "рЯПіу†БІу†БҐу†Б•у†БЃу†БІу†Бњ", score: "-" },
        away: { name: "Croatia", flag: "рЯЗ≠рЯЗЈ", score: "-" },
        status: "Tomorrow", timeLabel: "2:00 AM", 
        kickoffTime: "June 19, 2026 02:00:00" // а¶Па¶З а¶Єа¶ЃаІЯаІЗ а¶Ха¶Ња¶Йа¶®аІНа¶Яа¶°а¶Ња¶Йа¶® а¶ґаІЗа¶Ј а¶єа¶ђаІЗ
      },
      {
        group: "World Cup вАҐ Group L",
        home: { name: "Ghana", flag: "рЯЗђрЯЗ≠", score: "-" },
        away: { name: "Uruguay", flag: "рЯЗЇрЯЗЊ", score: "-" },
        status: "Tomorrow", timeLabel: "5:00 AM",
        kickoffTime: "June 19, 2026 05:00:00"
      }
    ];

    // ==========================================
    // аІ©. UI Render & Countdown Logic
    // ==========================================
    function renderMatches() {
      const liveContainer = document.getElementById('live-matches-container');
      const upcomingContainer = document.getElementById('upcoming-matches-container');
      
      // Render Live/Finished Matches
      liveContainer.innerHTML = matchesData.map(match => `
        <div class="match-card">
          <div class="match-header">${match.group}</div>
          <div class="match-body">
            <div class="teams-container">
              <div class="team-row"><span class="flag">${match.home.flag}</span><span class="team-name">${match.home.name}</span><span class="score">${match.home.score}</span></div>
              <div class="team-row"><span class="flag">${match.away.flag}</span><span class="team-name">${match.away.name}</span><span class="score">${match.away.score}</span></div>
            </div>
            <div class="status-container">
              <div class="status-text ${match.isLive ? 'status-live' : ''}">${match.status}</div>
              <div class="time-badge">${match.timeLabel}</div>
            </div>
          </div>
        </div>
      `).join('');

      // Render Upcoming Matches with Countdown Span
      upcomingContainer.innerHTML = upcomingMatchesData.map((match, index) => `
        <div class="match-card">
          <div class="match-header">${match.group}</div>
          <div class="match-body">
            <div class="teams-container">
              <div class="team-row"><span class="flag">${match.home.flag}</span><span class="team-name">${match.home.name}</span></div>
              <div class="team-row"><span class="flag">${match.away.flag}</span><span class="team-name">${match.away.name}</span></div>
            </div>
            <div class="status-container">
              <div class="status-text">${match.status}</div>
              <div class="time-badge">${match.timeLabel}</div>
              <div class="countdown" id="cd-${index}"></div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Countdown Timer Logic
    function startCountdown() {
      setInterval(() => {
        const now = new Date().getTime();

        upcomingMatchesData.forEach((match, index) => {
          const el = document.getElementById(`cd-${index}`);
          if(!el) return;

          const matchTime = new Date(match.kickoffTime).getTime();
          const distance = matchTime - now;

          if (distance > 0) {
            const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((distance % (1000 * 60)) / 1000);
            el.innerText = `In ${h}h ${m}m ${s}s`;
          } else {
            el.innerText = "Starting...";
            el.style.color = "#81c995"; // Green color when starting
          }
        });
      }, 1000);
    }

    // Initialize
    renderMatches();
    startCountdown();

  </script>  
</body>  
</html>
