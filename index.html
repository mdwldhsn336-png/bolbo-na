<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>FIFA WORLD CUP 2026™ | LIVE TV</title>     
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>  
    :root {
      --primary-neon: #00ffcc;
      --secondary-neon: #cc00ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }  
    
    body { 
      background: linear-gradient(135deg, #0b0914 0%, #1a1025 50%, #0d1b2a 100%);
      color: #fff; 
      min-height: 100vh;
      overflow-x: hidden; 
      background-attachment: fixed;
    }  

    header {
      text-align: center;
      padding: 20px 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
    }
    
    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #00ffcc, #cc00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      overflow: hidden;
    }

    .tv-section { max-width: 1100px; margin: 0 auto 40px auto; padding: 10px; }
    .shaka-video-container { width: 100%; aspect-ratio: 16 / 9; position: relative; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); }  
    video { width: 100%; height: 100%; background: #000; object-fit: contain; }  

    .content-container { display: grid; grid-template-columns: 1fr; gap: 30px; max-width: 800px; margin: 0 auto 50px auto; padding: 0 20px; }

    h2 { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    h2::before { content: ''; display: inline-block; width: 8px; height: 25px; background: linear-gradient(to bottom, #00ffcc, #cc00ff); border-radius: 4px; }

    .card { padding: 20px; margin-bottom: 20px; text-align: center; }
    .teams { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; gap: 15px; }
    .card-meta { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
    .score { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, #00ffcc, #00bfff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }
    
    .loading { text-align: center; color: #00ffcc; padding: 20px; font-weight: bold; }
    .live-badge { background: #ff004c; color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; animation: blink 1.5s infinite; }
    
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>  
</head>  
<body>  
  
  <header><h1>FIFA WORLD CUP 2026™</h1></header>

  <div class="tv-section glass-panel">
    <div class="shaka-video-container" data-shaka-player>  
      <video autoplay playsinline preload="metadata" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>  
    </div>  
  </div>

  <div class="content-container">
    <div>
      <h2>Current Live Matches</h2>
      <div id="live-container"><div class="loading">Fetching Live Football Data...</div></div>
    </div>
  </div>
  
  <script>  
    // ==========================================
    // ১. Shaka Player Setup
    // ==========================================
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  
      if (!shaka.Player.isBrowserSupported()) return;  
  
      const video = document.querySelector('video');  
      const player = new shaka.Player();  
      await player.attach(video);  
      const container = document.querySelector('.shaka-video-container');  
      const ui = new shaka.ui.Overlay(player, container, video);  
  
      ui.configure({  
        controlPanelElements: ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'fullscreen'],  
        volumeBarColors: { base: 'rgba(0, 255, 204, 0.3)', level: '#00ffcc' },  
        seekBarColors: { base: 'rgba(204, 0, 255, 0.3)', buffered: 'rgba(204, 0, 255, 0.6)', played: '#cc00ff' }
      });  
  
      let drmConfig = { clearKeys: { "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" } };  
      let streamUrl = "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd";  
  
      player.configure({ drm: drmConfig });  
      try { await player.load(streamUrl); } catch (error) { console.error('Load error:', error); }  
    });  

    // ==========================================
    // ২. New RapidAPI Integration
    // ==========================================
    const API_URL = "https://free-api-live-football-data.p.rapidapi.com/football-current-live";
    
    const options = {
        method: 'GET',
        headers: {
            'Content-Type': 'application/json',
            'x-rapidapi-host': 'free-api-live-football-data.p.rapidapi.com',
            'x-rapidapi-key': '66a7ec4ba1msh9e79ec607090c7dp161dccjsn47498d33a757'
        }
    };

    async function fetchLiveFootballData() {
      try {
        const response = await fetch(API_URL, options);
        const data = await response.json();
        
        console.log("API Response:", data); // ডেটা স্ট্রাকচার দেখার জন্য কনসোলে প্রিন্ট করা হলো

        // API থেকে পাওয়া ডেটার অ্যারে (যেহেতু বিভিন্ন API এর রেসপন্স আলাদা হয়)
        const matches = data.response || data.data || data || [];

        renderLiveMatches(matches);
      } catch (error) {
        console.error("Error fetching API data", error);
        document.getElementById('live-container').innerHTML = `<div class="loading" style="color:#ff004c;">Failed to load live data. Check console.</div>`;
      }
    }

    function renderLiveMatches(matches) {
      const container = document.getElementById('live-container');
      container.innerHTML = ''; 
      
      // যদি এই মুহূর্তে কোনো লাইভ ম্যাচ না থাকে
      if(!matches || matches.length === 0 || Object.keys(matches).length === 0) {
          container.innerHTML = '<div class="card glass-panel">No live matches available at this moment.</div>';
          return;
      }

      // ম্যাচগুলো লুপ করে কার্ড তৈরি করা
      // (নোট: আপনার নতুন API এর JSON key অনুযায়ী home_team, away_team নামগুলো আলাদা হতে পারে)
      // আমি একটি সাধারণ (Common) স্ট্রাকচার ব্যবহার করেছি
      matches.forEach(match => {
        
        // API এর ডেটা অনুযায়ী ভ্যালুগুলো চেক করে নেওয়া
        const homeTeam = match.homeTeam?.name || match.team1 || "Team 1";
        const awayTeam = match.awayTeam?.name || match.team2 || "Team 2";
        const homeScore = match.homeScore || match.score1 || "0";
        const awayScore = match.awayScore || match.score2 || "0";
        const leagueName = match.league?.name || match.tournament || "International Match";
        const status = match.time || match.status || "Live";

        const html = `
          <div class="card glass-panel">
            <div class="card-meta"><span class="live-badge">🔴 ${status}</span> | 🏆 ${leagueName}</div>
            <div class="teams">
              <span>${homeTeam}</span> 
              <span style="color:#00ffcc; margin:0 15px;">VS</span> 
              <span>${awayTeam}</span>
            </div>
            <div class="score">${homeScore} - ${awayScore}</div>
          </div>
        `;
        container.innerHTML += html;
      });
    }

    // পেজ লোড হলে API থেকে ডেটা কল করবে
    fetchLiveFootballData();

    // প্রতি ১ মিনিট (60000ms) পর পর স্কোর অটোমেটিক আপডেট করার জন্য
    setInterval(fetchLiveFootballData, 60000); 

  </script>  
</body>  
</html>
