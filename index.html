<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>FIFA WORLD CUP 2026™ | LIVE TV</title>     
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>  
    :root {
      --primary-neon: #00ffcc;
      --secondary-neon: #cc00ff;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }  
    
    body { 
      background: linear-gradient(135deg, #0b0914 0%, #1a1025 50%, #0d1b2a 100%);
      color: #fff; 
      min-height: 100vh;
      overflow-x: hidden; 
      background-attachment: fixed;
    }  

    header {
      text-align: center;
      padding: 15px 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 20px;
    }
    
    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--primary-neon), var(--secondary-neon));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      overflow: hidden;
    }

    /* --- TV Section --- */
    .tv-section { max-width: 1000px; margin: 0 auto 30px auto; padding: 10px; position: relative; }
    
    .shaka-video-container {  
      width: 100%;  
      aspect-ratio: 16 / 9;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
      background: #000;
    }  
    video { width: 100%; height: 100%; object-fit: contain; }  

    /* --- LIVE Animation Overlay --- */
    .live-indicator {
      position: absolute; top: 25px; left: 25px; background: rgba(255, 0, 76, 0.85); color: white; padding: 6px 15px;
      border-radius: 8px; font-weight: bold; font-size: 1rem; letter-spacing: 2px; z-index: 10; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 0 15px rgba(255, 0, 76, 0.5);
    }
    .live-dot { width: 10px; height: 10px; background-color: #fff; border-radius: 50%; animation: blink 1.2s infinite; }
    @keyframes blink { 0% { opacity: 1; box-shadow: 0 0 8px #fff; } 50% { opacity: 0.2; box-shadow: none; } 100% { opacity: 1; box-shadow: 0 0 8px #fff; } }

    /* --- TV Smart Overlays (Loading & Switching) --- */
    .tv-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .tv-overlay.show { opacity: 1; }
    .overlay-icon { font-size: 45px; margin-bottom: 10px; }
    .overlay-text { font-size: 1.3rem; font-weight: bold; color: var(--primary-neon); text-align: center; padding: 0 20px; }
    .overlay-subtext { font-size: 0.95rem; color: #cbd5e1; margin-top: 6px; }

    /* --- Content Section --- */
    .content-container { max-width: 800px; margin: 0 auto 50px auto; padding: 0 15px; }
    .section-title { font-size: 1.3rem; font-weight: 600; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; }
    .section-title::before { content: ''; display: inline-block; width: 6px; height: 22px; background: linear-gradient(to bottom, var(--primary-neon), var(--secondary-neon)); border-radius: 4px; }

    .match-card { padding: 15px 20px; margin-bottom: 15px; display: flex; flex-direction: column; }
    .match-header { font-size: 0.85rem; color: #94a3b8; margin-bottom: 12px; }
    .match-body { display: flex; justify-content: space-between; align-items: center; }
    .teams-container { flex: 1; border-right: 1px solid var(--glass-border); padding-right: 15px; }
    .team-row { display: flex; align-items: center; margin-bottom: 10px; }
    .team-row:last-child { margin-bottom: 0; }
    
    .flag { font-size: 1.4rem; margin-right: 12px; width: 30px; text-align: center; }
    .team-name { font-size: 1.1rem; color: #f8fafc; font-weight: 500; flex: 1; }
    .score { font-size: 1.2rem; color: var(--primary-neon); font-weight: 800; margin-left: 15px; }

    .status-container { width: 120px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .status-text { font-size: 0.95rem; font-weight: 600; color: #cbd5e1; margin-bottom: 4px; }
    .status-live { color: #ff004c; animation: pulse 1.5s infinite; } 
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    .time-badge { font-size: 0.85rem; color: #94a3b8; }
    .countdown { font-size: 0.9rem; color: var(--primary-neon); font-weight: 600; margin-top: 8px; background: rgba(0, 255, 204, 0.1); padding: 4px 8px; border-radius: 5px; }

  </style>  
</head>  
<body>  
  
  <header><h1>FIFA WORLD CUP 2026™</h1></header>

  <div class="tv-section glass-panel">
    
    <div class="live-indicator"><div class="live-dot"></div> LIVE</div>

    <div class="shaka-video-container" data-shaka-player>  
      <video id="video" autoplay playsinline preload="metadata" poster="https://w0.peakpx.com/wallpaper/183/933/HD-wallpaper-fifa-world-cup-26-u-sports-soccer-mexico-canada-football-fifa-world-cup-world-cup-2026-we-are-26-sport-event-international-competition-global-event-tournament.jpg"></video>  
      
      <div id="tv-overlay" class="tv-overlay">
         <div class="overlay-icon" id="overlay-icon">📡</div>
         <div class="overlay-text" id="overlay-text">Loading Channel...</div>
         <div class="overlay-subtext" id="overlay-subtext">Please wait</div>
      </div>
    </div>  
  </div>

  <div class="content-container">
    <div class="section-title">Today's Matches • June 22</div>
    <div id="today-matches-container"></div>
    
    <div class="section-title">Tomorrow • June 23</div>
    <div id="tomorrow-matches-container"></div>
  </div>
  
  <script>  
    // ==========================================
    // ১. আপনার দেওয়া M3U লিস্টের সব FIFA লাইভ সার্ভার
    // ==========================================
    const channelServers = [
      {
        name: "Server 1 (Main DASH Server)",
        url: "https://qp-pldt-live-bpk-ucd-prod.akamaized.net/bpk-tv/ch299/default/index.mpd",
        drm: { clearKeys: { "549ab7cd35a64bb6bb479ecead04d69d": "829799ed534d11fcadeb4b192467e050" } }
      },
      {
        name: "Server 2 (FIFA World Cup 2026)",
        url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1709/output/index.m3u8",
        drm: {}
      },
      {
        name: "Server 3 (FIFA World Cup HD)",
        url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1702/output/1702-audio_113322_eng=113200-video=2202800.m3u8",
        drm: {}
      },
      {
        name: "Server 4 (FIFA Argentina)",
        url: "http://cdn.tv-rds.workers.dev/TYCSPT.m3u8",
        drm: {}
      },
      {
        name: "Server 5 (FIFA Brazil)",
        url: "https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8",
        drm: {}
      },
      {
        name: "Server 6 (FIFA India A)",
        url: "http://66.102.126.10:8000/play/a076/index.m3u8",
        drm: {}
      },
      {
        name: "Server 7 (FIFA India B)",
        url: "http://66.102.126.10:8000/play/a022/index.m3u8",
        drm: {}
      },
      {
        name: "Server 8 (FIFA Live 266)",
        url: "http://103.204.43.87:8080/live/1/1/266.m3u8",
        drm: {}
      },
      {
        name: "Server 9 (FIFA Live 264)",
        url: "http://103.204.43.87:8080/live/1/1/264.m3u8",
        drm: {}
      },
      {
        name: "Server 10 (FIFA Pakistan)",
        url: "http://103.204.43.87:8080/live/1/1/313.m3u8",
        drm: {}
      },
      {
        name: "Server 11 (FIFA Plus Official English)",
        url: "https://a62dad94.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/UmFrdXRlblRWLWV1X0ZJRkFQbHVzRW5nbGlzaF9ITFM/playlist.m3u8",
        drm: {}
      }
    ];

    let currentServerIndex = 0;
    let retryCount = 0;
    const MAX_RETRY = 2; 
    let shakaPlayer;
    let isHandlingError = false; // ডাবল সুইচিং ব্লক করার জন্য ফ্ল্যাগ

    const tvOverlay = document.getElementById('tv-overlay');
    const overlayIcon = document.getElementById('overlay-icon');
    const overlayText = document.getElementById('overlay-text');
    const overlaySubtext = document.getElementById('overlay-subtext');

    function showOverlay(title, subtext, icon = "📡") {
      overlayIcon.innerText = icon;
      overlayText.innerText = title;
      overlaySubtext.innerText = subtext;
      tvOverlay.classList.add('show');
    }

    function hideOverlay() {
      tvOverlay.classList.remove('show');
    }

    // Shaka Player Setup
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  
      if (!shaka.Player.isBrowserSupported()) return;  
  
      const video = document.getElementById('video');  
      shakaPlayer = new shaka.Player();  
      await shakaPlayer.attach(video);  
      
      const container = document.querySelector('.shaka-video-container');  
      const ui = new shaka.ui.Overlay(shakaPlayer, container, video);  
      ui.configure({  
        controlPanelElements: ['play_pause', 'time_and_duration', 'mute', 'volume', 'spacer', 'fullscreen'],  
        volumeBarColors: { base: 'rgba(0, 255, 204, 0.3)', level: '#00ffcc' }
      });  

      // গ্লোবাল এরর লিসেনার যুক্ত করা
      shakaPlayer.addEventListener('error', (event) => onPlayerError(event.detail));

      // প্রথম সার্ভার চালানো শুরু
      loadChannel(currentServerIndex);
    });  

    // চ্যানেল লোড লজিক
    async function loadChannel(index) {
      isHandlingError = false; // নতুন লোড শুরু হলে ফ্ল্যাগ রিলিজ
      const server = channelServers[index];
      showOverlay("Connecting...", server.name, "📡");
      
      shakaPlayer.configure({ drm: server.drm });

      try {
        await shakaPlayer.load(server.url);
        console.log(`${server.name} runs perfectly!`);
        retryCount = 0; 
        hideOverlay();
      } catch (error) {
        onPlayerError(error);
      }
    }

    // অটো সুইচিং ইঞ্জিন (আপনার লজিক অনুযায়ী ফিক্স করা)
    function onPlayerError(error) {
      if (isHandlingError) return; 
      isHandlingError = true;

      console.error("Stream Error caught:", error);

      if (retryCount < MAX_RETRY) {
        retryCount++;
        showOverlay("Stream Offline", `Retrying (${retryCount}/${MAX_RETRY})...`, "⚠️");
        setTimeout(() => {
          loadChannel(currentServerIndex);
        }, 1500);
      } else {
        retryCount = 0;
        currentServerIndex = (currentServerIndex + 1) % channelServers.length;
        showOverlay("Switching Server", `Trying: ${channelServers[currentServerIndex].name}...`, "🔄");
        setTimeout(() => {
          loadChannel(currentServerIndex);
        }, 2000);
      }
    }

    // ==========================================
    // ২. আজকের ও আগামীকালের আসল ম্যাচ ডেটা (Google Layout)
    // ==========================================
    const todayMatches = [
      {
        group: "World Cup • Group J",
        home: { name: "Brazil", flag: "🇧🇷", score: "3" },
        away: { name: "France", flag: "🇫🇷", score: "2" },
        status: "Live", timeLabel: "84'", isLive: true
      },
      {
        group: "World Cup • Group J",
        home: { name: "Argentina", flag: "🇦🇷", score: "-" },
        away: { name: "Spain", flag: "🇪🇸", score: "-" },
        status: "Today", timeLabel: "10:00 PM",
        kickoffTime: "June 22, 2026 22:00:00"
      }
    ];

    const tomorrowMatches = [
      {
        group: "World Cup • Group K",
        home: { name: "Portugal", flag: "🇵🇹", score: "-" },
        away: { name: "Germany", flag: "🇩🇪", score: "-" },
        status: "Tomorrow", timeLabel: "2:00 AM", 
        kickoffTime: "June 23, 2026 02:00:00" 
      },
      {
        group: "World Cup • Group K",
        home: { name: "England", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", score: "-" },
        away: { name: "Italy", flag: "🇮🇹", score: "-" },
        status: "Tomorrow", timeLabel: "5:00 AM",
        kickoffTime: "June 23, 2026 05:00:00"
      }
    ];

    function renderCards(matches, containerId, prefixId) {
      const container = document.getElementById(containerId);
      container.innerHTML = matches.map((match, index) => `
        <div class="match-card glass-panel">
          <div class="match-header">${match.group}</div>
          <div class="match-body">
            <div class="teams-container">
              <div class="team-row">
                <span class="flag">${match.home.flag}</span>
                <span class="team-name">${match.home.name}</span>
                <span class="score">${match.home.score !== "-" ? match.home.score : ""}</span>
              </div>
              <div class="team-row">
                <span class="flag">${match.away.flag}</span>
                <span class="team-name">${match.away.name}</span>
                <span class="score">${match.away.score !== "-" ? match.away.score : ""}</span>
              </div>
            </div>
            <div class="status-container">
              <div class="status-text ${match.isLive ? 'status-live' : ''}">${match.status}</div>
              <div class="time-badge">${match.timeLabel}</div>
              ${match.kickoffTime ? `<div class="countdown" id="${prefixId}-${index}"></div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    function startCountdown() {
      setInterval(() => {
        const now = new Date().getTime();
        const allMatches = [
           { data: todayMatches, prefix: 'today' },
           { data: tomorrowMatches, prefix: 'tomorrow' }
        ];

        allMatches.forEach(dataset => {
          dataset.data.forEach((match, index) => {
            if(!match.kickoffTime) return;
            const el = document.getElementById(`${dataset.prefix}-${index}`);
            if(!el) return;

            const matchTime = new Date(match.kickoffTime).getTime();
            const distance = matchTime - now;

            if (distance > 0) {
              const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
              const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
              const s = Math.floor((distance % (1000 * 60)) / 1000);
              el.innerText = `${h}h ${m}m ${s}s`;
            } else {
              el.innerText = "LIVE NOW";
              el.style.color = "#ff004c"; 
            }
          });
        });
      }, 1000);
    }

    // Initialize UI
    renderCards(todayMatches, 'today-matches-container', 'today');
    renderCards(tomorrowMatches, 'tomorrow-matches-container', 'tomorrow');
    startCountdown();
  </script>  
</body>  
</html>
